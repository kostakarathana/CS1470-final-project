seed: 7
experiment_name: "ppo-dev"
env:
  name: "pommerman"
  mode: "ffa"
  num_agents: 4
  max_steps: 128
  board_size: 11
  observability: "full"
  communication: false
  board_value_count: 14
algorithm:
  name: "ppo"
  learner_setup: "single_learner"
  opponent_policy: "simple"
  reward_preset: "shaped"
  ppo:
    rollout_steps: 64
    minibatch_size: 32
    update_epochs: 4
training:
  total_steps: 512
  eval_interval_steps: 128
  eval_episodes: 4
  save_interval_steps: 128
  device: "cpu"
  log_dir: "artifacts/logs"
  checkpoint_dir: "artifacts/checkpoints"
