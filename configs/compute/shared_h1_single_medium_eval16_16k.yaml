seed: 7
experiment_name: "compute-shared-h1-single-medium-eval16-16k"
env:
  name: "pommerman"
  mode: "ffa"
  num_agents: 4
  max_steps: 192
  board_size: 11
  observability: "full"
  communication: false
  board_value_count: 14
algorithm:
  name: "shared"
  learner_setup: "single_learner"
  opponent_policy: "simple"
  reward_preset: "shaped"
  dreamer:
    latent_dim: 48
    hidden_dim: 192
    encoder_channels: 32
    sequence_length: 8
    replay_capacity: 8192
    batch_size: 12
    warmup_steps: 512
    policy_warmup_steps: 1024
    updates_per_collect: 2
    model_learning_rate: 0.0005
    actor_learning_rate: 0.0001
    critic_learning_rate: 0.0001
    imagination_horizon: 1
    kl_scale: 0.2
    free_nats: 0.1
    board_class_balance: 0.5
    entropy_coef: 0.005
training:
  total_steps: 16384
  eval_interval_steps: 1024
  eval_episodes: 16
  save_interval_steps: 2048
  device: "cpu"
  log_dir: "artifacts/compute/shared-h1-single-medium-eval16-16k/logs"
  checkpoint_dir: "artifacts/compute/shared-h1-single-medium-eval16-16k/checkpoints"
