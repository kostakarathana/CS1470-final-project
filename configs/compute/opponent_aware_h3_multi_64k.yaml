seed: 7
experiment_name: "compute-opponent-aware-h3-multi-64k"
env:
  name: "pommerman"
  mode: "ffa"
  num_agents: 4
  max_steps: 256
  board_size: 11
  observability: "full"
  communication: false
  board_value_count: 14
algorithm:
  name: "opponent_aware"
  learner_setup: "multi_learner"
  opponent_policy: "simple"
  reward_preset: "shaped"
  dreamer:
    latent_dim: 64
    hidden_dim: 256
    encoder_channels: 64
    sequence_length: 16
    replay_capacity: 32768
    batch_size: 24
    warmup_steps: 2048
    updates_per_collect: 4
    model_learning_rate: 0.0003
    actor_learning_rate: 0.0001
    critic_learning_rate: 0.0001
    imagination_horizon: 3
    entropy_coef: 0.03
training:
  total_steps: 65536
  eval_interval_steps: 2048
  eval_episodes: 16
  save_interval_steps: 4096
  device: "cpu"
  log_dir: "artifacts/compute/opponent-aware-h3-multi-64k/logs"
  checkpoint_dir: "artifacts/compute/opponent-aware-h3-multi-64k/checkpoints"
