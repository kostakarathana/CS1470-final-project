seed: 7
experiment_name: "shared-dev"
env:
  name: "pommerman"
  mode: "ffa"
  num_agents: 4
  max_steps: 128
  board_size: 11
  observability: "full"
  communication: false
  board_value_count: 14
algorithm:
  name: "shared"
  learner_setup: "single_learner"
  opponent_policy: "simple"
  reward_preset: "shaped"
  dreamer:
    latent_dim: 32
    hidden_dim: 128
    encoder_channels: 32
    sequence_length: 8
    replay_capacity: 512
    batch_size: 8
    warmup_steps: 32
    updates_per_collect: 2
    imagination_horizon: 5
training:
  total_steps: 512
  eval_interval_steps: 128
  eval_episodes: 4
  save_interval_steps: 128
  device: "cpu"
  log_dir: "artifacts/logs"
  checkpoint_dir: "artifacts/checkpoints"
