seed: 7
experiment_name: "team-shared-smoke"
env:
  name: "pommerman"
  mode: "team"
  env_id: "PommeTeamCompetition-v0"
  num_agents: 4
  max_steps: 10
  board_size: 11
  observability: "partial"
  communication: false
  board_value_count: 14
algorithm:
  name: "shared"
  learner_setup: "multi_learner"
  opponent_policy: "simple"
  reward_preset: "shaped"
  dreamer:
    latent_dim: 32
    hidden_dim: 96
    encoder_channels: 24
    sequence_length: 3
    replay_capacity: 128
    batch_size: 2
    warmup_steps: 4
    updates_per_collect: 1
    imagination_horizon: 3
training:
  total_steps: 12
  eval_interval_steps: 12
  eval_episodes: 2
  save_interval_steps: 12
  device: "cpu"
  log_dir: "artifacts/logs"
  checkpoint_dir: "artifacts/checkpoints"
